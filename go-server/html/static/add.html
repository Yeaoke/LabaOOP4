<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить компанию</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function toggleFields() {
            const type = document.getElementById('type').value;
            document.getElementById('coalFields').style.display = type === 'coal' ? 'block' : 'none';
            document.getElementById('oilFields').style.display = type === 'oil' ? 'block' : 'none';
        }
    </script>
</head>
<body>
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h2 class="mb-0">➕ Добавить промышленную компанию</h2>
        </div>
        <div class="card-body">
            <form action="/api/add" method="post" id="addForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Название компании:</label>
                    <input type="text" name="company_name" class="form-control" placeholder="Введите название" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Тип компании:</label>
                    <select name="company_type" id="type" class="form-select" onchange="toggleFields()" required>
                        <option value="coal">⛏️ Угольная</option>
                        <option value="oil">🛢️ Нефтяная</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Годовой оборот (млн руб):</label>
                    <input type="number" name="annual_turnover" class="form-control" placeholder="Например: 5000" required min="0">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Название холдинга (опционально):</label>
                    <input type="text" name="holding_name" class="form-control" placeholder="Введите название холдинга">
                </div>

                <!-- Поля для угольной компании -->
                <div id="coalFields">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Объем добычи угля (тыс. тонн):</label>
                        <input type="number" name="coal_volume" class="form-control" placeholder="Например: 1200" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Количество шахт:</label>
                        <input type="number" name="mineCount" class="form-control" placeholder="Например: 5" min="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Действие по углю:</label>
                        <textarea name="coal_action" class="form-control" rows="2" placeholder="Описание действий..."></textarea>
                    </div>
                </div>

                <!-- Поля для нефтяной компании -->
                <div id="oilFields" style="display:none">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Объем добычи нефти (тыс. баррелей):</label>
                        <input type="number" name="oil_volume" class="form-control" placeholder="Например: 800" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Количество скважин:</label>
                        <input type="number" name="holeCount" class="form-control" placeholder="Например: 25" min="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Действие по нефти:</label>
                        <textarea name="oil_action" class="form-control" rows="2" placeholder="Описание действий..."></textarea>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                    <a href="/" class="btn btn-secondary">❌ Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
toggleFields();

// Обработка формы через fetch для JSON
document.getElementById('addForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const data = {};
    formData.forEach((value, key) => {
        if (value) {
            // Преобразуем числовые поля
            if (['annual_turnover', 'coal_volume', 'mineCount', 'oil_volume', 'holeCount'].includes(key)) {
                data[key] = parseInt(value) || 0;
            } else {
                data[key] = value;
            }
        }
    });

    try {
        const response = await fetch('/api/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            window.location.href = '/';
        } else {
            const err = await response.text();
            alert('Ошибка: ' + err);
        }
    } catch (err) {
        alert('Ошибка сети: ' + err.message);
    }
});
</script>
</body>
</html>
