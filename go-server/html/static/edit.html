<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать компанию</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-warning">
            <h2 class="mb-0">✏️ Редактировать промышленную компанию</h2>
        </div>
        <div class="card-body">
            <form action="/api/edit/{{.Company.ID}}" method="post" id="editForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Название компании:</label>
                    <input type="text" name="company_name" value="{{.Company.CompanyName}}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Тип компании:</label>
                    <select class="form-select" disabled>
                        <option {{if eq .Company.CompanyType "coal"}}selected{{end}} value="coal">⛏️ Угольная</option>
                        <option {{if eq .Company.CompanyType "oil"}}selected{{end}} value="oil">🛢️ Нефтяная</option>
                    </select>
                    <small class="text-muted">Тип нельзя изменить после создания.</small>
                    <input type="hidden" name="company_type" value="{{.Company.CompanyType}}">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Годовой оборот (млн руб):</label>
                    <input type="number" name="annual_turnover" value="{{.Company.AnnualTurnover}}" class="form-control" required min="0">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Название холдинга:</label>
                    <input type="text" name="holding_name" value="{{.Company.HoldingName}}" class="form-control" placeholder="Введите название холдинга">
                </div>

                <!-- Поля для угольной компании -->
                {{if eq .Company.CompanyType "coal"}}
                <div class="border-top pt-3 mt-3">
                    <h5 class="text-secondary">⛏️ Данные по углю</h5>
                    <div class="mb-3">
                        <label class="form-label">Объем добычи угля (тыс. тонн):</label>
                        <input type="number" name="coal_volume" value="{{.Company.Coal_volume}}" class="form-control" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Количество шахт:</label>
                        <input type="number" name="mineCount" value="{{.Company.MineCount}}" class="form-control" min="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Действие по углю:</label>
                        <textarea name="coal_action" class="form-control" rows="2">{{.Company.Coal_action}}</textarea>
                    </div>
                </div>
                {{end}}

                <!-- Поля для нефтяной компании -->
                {{if eq .Company.CompanyType "oil"}}
                <div class="border-top pt-3 mt-3">
                    <h5 class="text-secondary">🛢️ Данные по нефти</h5>
                    <div class="mb-3">
                        <label class="form-label">Объем добычи нефти (тыс. баррелей):</label>
                        <input type="number" name="oil_volume" value="{{.Company.Oil_volume}}" class="form-control" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Количество скважин:</label>
                        <input type="number" name="holeCount" value="{{.Company.HoleCount}}" class="form-control" min="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Действие по нефти:</label>
                        <textarea name="oil_action" class="form-control" rows="2">{{.Company.Oil_action}}</textarea>
                    </div>
                </div>
                {{end}}

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">💾 Сохранить изменения</button>
                    <a href="/" class="btn btn-secondary">❌ Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('editForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const data = {};
    formData.forEach((value, key) => {
        if (value) {
            if (['annual_turnover', 'coal_volume', 'mineCount', 'oil_volume', 'holeCount'].includes(key)) {
                data[key] = parseInt(value) || 0;
            } else {
                data[key] = value;
            }
        }
    });

    const companyId = "{{.Company.ID}}";
    
    try {
        const response = await fetch(`/api/edit/${companyId}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            window.location.href = '/';
        } else {
            const err = await response.text();
            alert('Ошибка: ' + err);
        }
    } catch (err) {
        alert('Ошибка сети: ' + err.message);
    }
});
</script>
</body>
</html>
