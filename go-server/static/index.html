<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление промышленными компаниями</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .card { border-radius: 15px; overflow: hidden; margin-top: 20px; }
        .btn { border-radius: 8px; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        th { background-color: #343a40; color: white; }
        .badge-coal { background-color: #6c757d; }
        .badge-oil { background-color: #fd7e14; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h1 class="text-center mb-0">🏭 Система управления промышленными компаниями</h1>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <a href="/add" class="btn btn-success">➕ Добавить компанию</a>
            </div>

            <table class="table table-striped table-bordered table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Тип</th>
                    <th>Оборот (млн руб)</th>
                    <th>Холдинг</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="company : ${companies}">
                    <td th:text="${company.id}" class="text-center"></td>
                    <td th:text="${company.name}"></td>
                    <td class="text-center">
                        <span th:if="${company.type == 'coal'}" class="badge badge-coal">Угольная</span>
                        <span th:if="${company.type == 'oil'}" class="badge badge-oil">Нефтяная</span>
                    </td>
                    <td th:text="${company.turnover}" class="text-end"></td>
                    <td th:text="${company.holdingName != null ? company.holdingName : '—'}"></td>
                    <td class="text-center">
                        <a th:href="@{/info/{id}(id=${company.id})}" class="btn btn-info btn-sm">Подробнее</a>
                        <a th:href="@{/edit/{id}(id=${company.id})}" class="btn btn-warning btn-sm">Редактировать</a>
                        <a th:href="@{/delete/{id}(id=${company.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Удалить компанию?')">Удалить</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
