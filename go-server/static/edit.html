<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать компанию</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-warning">
            <h2 class="mb-0">✏️ Редактировать промышленную компанию</h2>
        </div>
        <div class="card-body">
            <form action="/edit/{{.Company.ID}}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Название компании:</label>
                    <input type="text" name="name" value="{{.Company.Name}}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Тип компании:</label>
                    <select name="type" class="form-select" disabled>
                        <option {{if eq .Company.Type "coal"}}selected{{end}} value="coal">⛏️ Угольная</option>
                        <option {{if eq .Company.Type "oil"}}selected{{end}} value="oil">🛢️ Нефтяная</option>
                    </select>
                    <small class="text-muted">Тип нельзя изменить после создания.</small>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Годовой оборот (млн руб):</label>
                    <input type="number" name="turnover" value="{{.Company.Turnover}}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Холдинговая компания:</label>
                    <select name="holdingId" class="form-select">
                        <option value="">— Без холдинга —</option>
                        <option {{if eq .Company.HoldingID 1}}selected{{end}} value="1">ООО «ЭнергоХолдинг»</option>
                        <option {{if eq .Company.HoldingID 2}}selected{{end}} value="2">АО «ПромИнвест»</option>
                    </select>
                </div>

                <!-- Поля для угольной компании -->
                {{if eq .Company.Type "coal"}}
                <div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Объем добычи угля (тыс. тонн):</label>
                        <input type="number" name="coalVolume" value="{{.Company.CoalVolume}}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Количество шахт:</label>
                        <input type="number" name="mineCount" value="{{.Company.MineCount}}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Действие по углю:</label>
                        <textarea name="coalAction" class="form-control" rows="2">{{.Company.CoalAction}}</textarea>
                    </div>
                </div>
                {{end}}

                <!-- Поля для нефтяной компании -->
                {{if eq .Company.Type "oil"}}
                <div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Объем добычи нефти (тыс. баррелей):</label>
                        <input type="number" name="oilVolume" value="{{.Company.OilVolume}}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Количество скважин:</label>
                        <input type="number" name="wellCount" value="{{.Company.WellCount}}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Действие по нефти:</label>
                        <textarea name="oilAction" class="form-control" rows="2">{{.Company.OilAction}}</textarea>
                    </div>
                </div>
                {{end}}

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                    <a href="/" class="btn btn-secondary">❌ Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
